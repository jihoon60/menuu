<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘 뭐 시킬까?</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0c14;
    --surface: #181624;
    --surface2: #201e30;
    --accent: #ff6b35;
    --accent2: #ffcc00;
    --text: #fffffe;
    --sub: #8b8da8;
    --border: rgba(255,255,255,0.07);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
  }

  .app {
    position: relative; z-index: 1;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 70% 30%, rgba(255,107,53,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 20% 80%, rgba(255,204,0,0.05) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 56px 14px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.5rem;
    letter-spacing: -1px;
  }
  .logo span { color: var(--accent); }

  .progress-track { display: flex; align-items: center; }

  .prog-step {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 20px;
    border-radius: 30px;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--sub);
    transition: all 0.4s;
  }
  .prog-step.done { color: var(--accent); }
  .prog-step.active { background: rgba(255,107,53,0.12); color: var(--accent); border: 1px solid rgba(255,107,53,0.25); }
  .prog-step .num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    transition: all 0.4s;
  }
  .prog-step.active .num { background: var(--accent); color: white; }
  .prog-step.done .num { background: rgba(255,107,53,0.3); color: var(--accent); }
  .prog-divider { width: 28px; height: 1px; background: var(--border); }

  .breadcrumb-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    min-width: 220px;
    justify-content: flex-end;
  }
  .crumb {
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.25);
    color: var(--accent);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .crumb-arrow { color: var(--sub); font-size: 0.8rem; }

  /* MAIN */
  main {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 56px;
    overflow: hidden;
  }

  .step { display: none; width: 100%; animation: fadeUp 0.45s ease forwards; }
  .step.active { display: flex; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .step-center {
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .step-question {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(1.8rem, 2.4vw, 2.6rem);
    text-align: center;
    margin-bottom: 44px;
  }
  .step-question .accent { color: var(--accent); }

  /* CARDS 4 */
  .cards-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    width: 100%;
    max-width: 920px;
  }

  .card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 28px;
    padding: 44px 24px 38px;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.2); }
  .card:active { transform: scale(0.97); }

  .card-emoji { font-size: 3.2rem; position: relative; z-index: 1; }
  .card-name { font-family: 'Black Han Sans', sans-serif; font-size: 1.5rem; position: relative; z-index: 1; }

  /* CARDS 2 */
  .cards-2 {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
    width: 100%;
    max-width: 700px;
  }

  .cards-2 .card { padding: 56px 32px 48px; }
  .cards-2 .card-emoji { font-size: 4rem; }
  .cards-2 .card-name { font-size: 1.7rem; }

  /* STEP 3 */
  .step-roulette {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .roulette-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .canvas-wrap {
    position: relative;
    width: min(55vh, 50vw);
    height: min(55vh, 50vw);
  }

  canvas {
    display: block;
    border-radius: 50%;
    box-shadow: 0 0 0 5px rgba(255,255,255,0.06), 0 24px 80px rgba(0,0,0,0.7);
  }

  .pointer {
    position: absolute;
    top: -16px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 34px solid var(--accent);
    z-index: 10;
  }

  .spin-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 60px;
    padding: 14px 56px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.3rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .spin-btn:hover { opacity: 0.85; }
  .spin-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .result-col { display: none; }

  .action-row { display: flex; gap: 12px; }

  .again-btn {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 28px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .again-btn:hover { background: var(--surface); border-color: rgba(255,255,255,0.2); }
  .again-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .restart-btn {
    background: transparent;
    color: var(--sub);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 28px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .restart-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }

  /* BACK BUTTON */
  .back-btn {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--sub);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }

  .step-header {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 920px;
    margin-bottom: 44px;
  }
  .step-header .step-question { margin-bottom: 0; }

  @media (max-width: 1024px) {
    .step-header { max-width: 680px; margin-bottom: 32px; }
  }
  @media (max-width: 767px) {
    .step-header { max-width: 100%; margin-bottom: 20px; }
    .back-btn { font-size: 0.78rem; padding: 6px 12px; }
  }
  .modal-overlay {
    position: fixed;
    inset: 0;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 100;
  }
  .modal-overlay.show { opacity: 1; }
  .modal-box {
    background: #1c1c1c;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 36px 56px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 2rem;
    color: var(--text);
    transform: scale(0.9);
    transition: transform 0.3s ease;
  }
  .modal-overlay.show .modal-box { transform: scale(1); }

  /* ── TABLET ── */
  @media (max-width: 1024px) {
    header { padding: 14px 32px 12px; }
    .breadcrumb-bar { min-width: 160px; }
    main { padding: 0 32px; }
    .cards-4 { max-width: 680px; gap: 14px; }
    .card { padding: 32px 16px 26px; border-radius: 20px; gap: 10px; }
    .card-emoji { font-size: 2.4rem; }
    .card-name { font-size: 1.2rem; }
    .cards-2 { max-width: 560px; gap: 16px; }
    .cards-2 .card { padding: 40px 24px 36px; }
    .cards-2 .card-emoji { font-size: 3rem; }
    .cards-2 .card-name { font-size: 1.4rem; }
    .canvas-wrap { width: min(50vh, 55vw); height: min(50vh, 55vw); }
    .step-question { font-size: clamp(1.5rem, 2.5vw, 2.2rem); margin-bottom: 32px; }
  }

  /* ── MOBILE ── */
  @media (max-width: 767px) {
    header { padding: 12px 20px 10px; }
    .progress-track { display: none; }
    .breadcrumb-bar { min-width: unset; }
    .logo { font-size: 1.2rem; }
    main { padding: 0 16px; }
    .step-question { font-size: 1.4rem; margin-bottom: 20px; }
    .cards-4 { grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 100%; }
    .card { padding: 28px 12px 22px; border-radius: 18px; gap: 8px; }
    .card-emoji { font-size: 2rem; }
    .card-name { font-size: 1.1rem; }
    .cards-2 { gap: 12px; max-width: 100%; }
    .cards-2 .card { padding: 32px 20px 28px; }
    .cards-2 .card-emoji { font-size: 2.6rem; }
    .cards-2 .card-name { font-size: 1.3rem; }
    .canvas-wrap { width: min(70vw, 50vh); height: min(70vw, 50vh); }
    .roulette-col { gap: 16px; }
    .spin-btn { padding: 12px 40px; font-size: 1.1rem; }
    .again-btn, .restart-btn { padding: 10px 18px; font-size: 0.8rem; }
    .modal-box { font-size: 1.5rem; padding: 28px 36px; }
  }

  /* ── SMALL MOBILE ── */
  @media (max-width: 390px) {
    .step-question { font-size: 1.2rem; }
    .card-emoji { font-size: 1.7rem; }
    .card-name { font-size: 0.95rem; }
    .canvas-wrap { width: 76vw; height: 76vw; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">오늘 <span>뭐</span> 시킬까?</div>
    <div class="progress-track">
      <div class="prog-step active" id="prog1"><span class="num">1</span> 종류 선택</div>
      <div class="prog-divider"></div>
      <div class="prog-step" id="prog2"><span class="num">2</span> 매운맛 선택</div>
      <div class="prog-divider"></div>
      <div class="prog-step" id="prog3"><span class="num">3</span> 룰렛</div>
    </div>
    <div class="breadcrumb-bar" id="breadcrumb"></div>
  </header>

  <main>

    <!-- STEP 1 -->
    <div class="step step-center active" id="step1">
      <div class="step-question">어떤 종류가 <span class="accent">땡기세요?</span></div>
      <div class="cards-4">
        <div class="card" onclick="selectCuisine('한식','🍚')">
          <div class="card-emoji">🍚</div>
          <div class="card-name">한식</div>
        </div>
        <div class="card" onclick="selectCuisine('일식','🍱')">
          <div class="card-emoji">🍱</div>
          <div class="card-name">일식</div>
        </div>
        <div class="card" onclick="selectCuisine('중식','🥢')">
          <div class="card-emoji">🥢</div>
          <div class="card-name">중식</div>
        </div>
        <div class="card" onclick="selectCuisine('양식','🍝')">
          <div class="card-emoji">🍝</div>
          <div class="card-name">양식</div>
        </div>
      </div>
    </div>

    <!-- STEP 2 -->
    <div class="step step-center" id="step2">
      <div class="step-header">
        <button class="back-btn" onclick="goBack(1)">← 뒤로</button>
        <div class="step-question">매운 거 <span class="accent">좋아하세요?</span></div>
      </div>
      <div class="cards-2">
        <div class="card" onclick="selectSpice(true)">
          <div class="card-emoji">🌶️</div>
          <div class="card-name">매운 음식</div>
        </div>
        <div class="card" onclick="selectSpice(false)">
          <div class="card-emoji">❌</div>
          <div class="card-name">안 매운 음식</div>
        </div>
      </div>
    </div>

    <!-- STEP 3 -->
    <div class="step" id="step3">
      <div class="step-roulette">
        <div class="roulette-col">
          <div class="canvas-wrap">
            <div class="pointer"></div>
            <canvas id="rouletteCanvas"></canvas>
          </div>
          <button class="spin-btn" id="spinBtn" onclick="spinRoulette()">룰렛 돌리기</button>
          <div class="action-row" id="actionRow" style="display:none;">
            <button class="restart-btn" onclick="goBack(2)">← 뒤로</button>
            <button class="restart-btn" onclick="restart()">↩ 처음부터</button>
          </div>
          <div class="action-row" id="backRow">
            <button class="restart-btn" onclick="goBack(2)">← 뒤로</button>
          </div>
        </div>
        <div class="result-col"></div>
      </div>
    </div>

  </main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox"></div>
</div>

<script>
const menus = {
  한식: {
    spicy: [
      {name:'떡볶이',     emoji:'🍢'},
      {name:'마라탕',     emoji:'🌶️'},
      {name:'닭발',       emoji:'🦶'},
      {name:'제육볶음',   emoji:'🥩'},
      {name:'매운 찜닭',  emoji:'🔥'},
      {name:'양념치킨',   emoji:'🍗'},
      {name:'닭강정',     emoji:'🍗'},
      {name:'낙곱새',     emoji:'🦑'},
      {name:'김치찜',     emoji:'🫕'},
      {name:'김치볶음밥', emoji:'🍳'},
      {name:'비빔냉면',   emoji:'🍜'},
      {name:'닭갈비',     emoji:'🍗'},
      {name:'곱도리탕',   emoji:'🥘'},
    ],
    mild: [
      {name:'보쌈',      emoji:'🥬'},
      {name:'족발',      emoji:'🍖'},
      {name:'칼국수',    emoji:'🍜'},
      {name:'간장 찜닭', emoji:'🍗'},
      {name:'닭강정',    emoji:'🍗'},
      {name:'물냉면',    emoji:'🍜'},
      {name:'국밥',      emoji:'🍲'},
      {name:'수제비',    emoji:'🥣'},
      {name:'국수',      emoji:'🍜'},
      {name:'덮밥',      emoji:'🍚'},
      {name:'죽',        emoji:'🥣'},
      {name:'갈비찜',    emoji:'🥩'},
    ]
  },
  일식: {
    spicy: [
      {name:'탄탄멘',    emoji:'🍜'},
      {name:'야끼우동',  emoji:'🍜'},
      {name:'매운 라멘', emoji:'🔥'},
    ],
    mild: [
      {name:'초밥',   emoji:'🍣'},
      {name:'돈까스', emoji:'🍱'},
      {name:'규동',   emoji:'🥩'},
      {name:'우동',   emoji:'🍜'},
    ]
  },
  중식: {
    spicy: [
      {name:'마라탕',     emoji:'🌶️'},
      {name:'마라샹궈',   emoji:'🌶️'},
      {name:'마라새우',   emoji:'🦐'},
      {name:'짬뽕',       emoji:'🦐'},
      {name:'훠궈',       emoji:'🔥'},
      {name:'사천짜장',   emoji:'🍜'},
      {name:'마파두부',   emoji:'🫕'},
      {name:'사천볶음밥', emoji:'🍳'},
      {name:'고추잡채',   emoji:'🥢'},
      {name:'깐풍기',     emoji:'🍗'},
      {name:'유린기',     emoji:'🍗'},
    ],
    mild: [
      {name:'짜장면',   emoji:'🍜'},
      {name:'간짜장',   emoji:'🍜'},
      {name:'쟁반짜장', emoji:'🍜'},
      {name:'볶음밥',   emoji:'🍳'},
      {name:'잡채밥',   emoji:'🍚'},
      {name:'기스면',   emoji:'🍜'},
      {name:'탕수육',   emoji:'🥩'},
      {name:'꿔바로우', emoji:'🥩'},
      {name:'동파육',   emoji:'🥩'},
      {name:'팔보채',   emoji:'🦐'},
      {name:'양꼬치',   emoji:'🍢'},
    ]
  },
  양식: {
    spicy: [
      {name:'디아블로 파스타', emoji:'🍝'},
      {name:'퀘사디아',       emoji:'🫓'},
      {name:'매운 타코',      emoji:'🌮'},
      {name:'매운 부리또',    emoji:'🌯'},
      {name:'매운 햄버거',    emoji:'🍔'},
      {name:'핫 버팔로윙',    emoji:'🍗'},
    ],
    mild: [
      {name:'까르보나라 파스타', emoji:'🍝'},
      {name:'크림 파스타',       emoji:'🍝'},
      {name:'고르곤졸라 피자',   emoji:'🍕'},
      {name:'포테이토 피자',     emoji:'🍕'},
      {name:'스테이크',          emoji:'🥩'},
      {name:'라자냐',            emoji:'🍝'},
      {name:'그라탕',            emoji:'🫕'},
      {name:'햄버거',            emoji:'🍔'},
      {name:'치킨',              emoji:'🍗'},
    ]
  }
};

const COLORS = [
  '#1c1c1c','#2e2e2e','#1c1c1c','#2e2e2e','#1c1c1c',
  '#2e2e2e','#1c1c1c','#2e2e2e','#1c1c1c','#2e2e2e',
  '#1c1c1c','#2e2e2e','#1c1c1c'
];

let selectedCuisine='', selectedEmoji='', selectedSpicy=false;
let items=[], spinning=false, currentAngle=0;

function setProgress(step) {
  for (let i=1; i<=3; i++) {
    const el = document.getElementById(`prog${i}`);
    el.classList.remove('active','done');
    if (i < step) el.classList.add('done');
    else if (i === step) el.classList.add('active');
  }
}

function selectCuisine(name, emoji) {
  selectedCuisine = name; selectedEmoji = emoji;
  document.getElementById('step1').classList.remove('active');
  document.getElementById('step2').classList.add('active');
  setProgress(2);
  document.getElementById('breadcrumb').innerHTML = `<span class="crumb">${emoji} ${name}</span>`;
}

function selectSpice(spicy) {
  selectedSpicy = spicy;
  items = menus[selectedCuisine][spicy ? 'spicy' : 'mild'];
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step3').classList.add('active');
  setProgress(3);

  const spiceLabel = spicy ? '🌶️ 매운맛' : '😌 순한맛';
  document.getElementById('breadcrumb').innerHTML =
    `<span class="crumb">${selectedEmoji} ${selectedCuisine}</span>
     <span class="crumb-arrow">›</span>
     <span class="crumb">${spiceLabel}</span>`;

  document.getElementById('spinBtn').disabled = false;
  document.getElementById('actionRow').style.display = 'none';
  document.getElementById('backRow').style.display = 'flex';
  hideModal();
  currentAngle = 0;
  setTimeout(() => drawRoulette(0), 50);
}

function drawRoulette(rotation) {
  const canvas = document.getElementById('rouletteCanvas');
  const wrap = canvas.parentElement;
  const size = wrap.offsetWidth;
  if (!size) return;
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const cx=size/2, cy=size/2, r=size/2-4;
  const slice = Math.PI*2 / items.length;

  ctx.clearRect(0,0,size,size);
  items.forEach((item,i) => {
    const s=rotation+i*slice, e=s+slice;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,s,e); ctx.closePath();
    ctx.fillStyle=COLORS[i%COLORS.length]; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=2; ctx.stroke();

    ctx.save(); ctx.translate(cx,cy); ctx.rotate(s+slice/2);
    ctx.textAlign='right';
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.font=`700 ${Math.max(11,size*0.036)}px 'Noto Sans KR',sans-serif`;
    ctx.fillText(item.name, r*0.72, size*0.022);
    ctx.restore();
  });

  ctx.beginPath(); ctx.arc(cx,cy,size*0.065,0,Math.PI*2);
  ctx.fillStyle='#0d0c14'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=2; ctx.stroke();
}

function spinRoulette() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('actionRow').style.display = 'none';
  document.getElementById('backRow').style.display = 'none';
  hideModal();

  const totalSpin = Math.PI*2*(9+Math.random()*7);
  const duration = 4200+Math.random()*1500;
  const startTime = performance.now();
  const startAngle = currentAngle;

  function animate(now) {
    const t = Math.min((now-startTime)/duration, 1);
    const eased = 1-Math.pow(1-t,4);
    currentAngle = startAngle + totalSpin*eased;
    drawRoulette(currentAngle);
    if (t<1) requestAnimationFrame(animate);
    else { spinning=false; showResult(currentAngle); }
  }
  requestAnimationFrame(animate);
}

let modalTimer = null;

function showModal(text) {
  const overlay = document.getElementById('modalOverlay');
  const box = document.getElementById('modalBox');
  box.textContent = text;
  overlay.classList.add('show');
  if (modalTimer) clearTimeout(modalTimer);
  modalTimer = setTimeout(() => hideModal(), 1000);
}

function hideModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  if (modalTimer) { clearTimeout(modalTimer); modalTimer = null; }
}

function showResult(angle) {
  const slice = Math.PI*2 / items.length;
  const norm = (((-angle - Math.PI/2) % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  const idx = Math.floor(norm/slice) % items.length;
  const picked = items[idx];

  setTimeout(() => {
    showModal(picked.name);
    document.getElementById('spinBtn').disabled = false;
    document.getElementById('actionRow').style.display = 'flex';
    document.getElementById('backRow').style.display = 'none';
  }, 200);
}

function goBack(toStep) {
  hideModal();
  if (spinning) return; // 돌아가는 중엔 뒤로가기 막기
  spinning = false;

  document.getElementById('step1').classList.remove('active');
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step3').classList.remove('active');
  document.getElementById('actionRow').style.display = 'none';
  document.getElementById('backRow').style.display = 'flex';

  if (toStep === 1) {
    document.getElementById('step1').classList.add('active');
    document.getElementById('breadcrumb').innerHTML = '';
    setProgress(1);
  } else if (toStep === 2) {
    document.getElementById('step2').classList.add('active');
    document.getElementById('breadcrumb').innerHTML = `<span class="crumb">${selectedEmoji} ${selectedCuisine}</span>`;
    setProgress(2);
  }
}

function restart() {
  hideModal();
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step3').classList.remove('active');
  document.getElementById('actionRow').style.display = 'none';
  document.getElementById('backRow').style.display = 'none';
  document.getElementById('breadcrumb').innerHTML = '';
  currentAngle = 0;
  document.getElementById('step1').classList.add('active');
  setProgress(1);
}

window.addEventListener('resize', () => {
  if (document.getElementById('step3').classList.contains('active'))
    drawRoulette(currentAngle);
});
</script>
